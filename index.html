<!doctype html>
<html lang="en" class="bg-[#03030b] text-slate-100 antialiased">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Sandbox-safe global proxy wrapper to prevent TypeError: Cannot set property fetch of #<Window>
      (function() {
        try {
          var customGlobal = new Proxy(window, {
            get: function(target, prop) {
              if (prop === 'fetch') {
                return window.fetch;
              }
              var val = target[prop];
              if (typeof val === 'function' && prop !== 'constructor' && !prop.toString().includes('Element')) {
                return val.bind(target);
              }
              return val;
            },
            set: function(target, prop, value) {
              if (prop === 'fetch') {
                console.warn("Intercepted read-only fetch assignment safely.");
                return true;
              }
              try {
                target[prop] = value;
              } catch (e) {
                console.warn("Protected write error for property: " + String(prop));
              }
              return true;
            }
          });

          // Expose as 'global' which many polyfills and bundles write to direct
          try {
            Object.defineProperty(window, 'global', {
              value: customGlobal,
              writable: true,
              configurable: true,
              enumerable: true
            });
          } catch (e) {}

          // Also map configurable window.globalThis
          try {
            var desc = Object.getOwnPropertyDescriptor(window, 'globalThis');
            if (!desc || desc.configurable) {
              Object.defineProperty(window, 'globalThis', {
                value: customGlobal,
                writable: true,
                configurable: true,
                enumerable: true
              });
            }
          } catch (e) {}

        } catch (err) {
          console.warn("Safe global context initializer error: ", err);
        }
      })();
    </script>
